name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Ruff, Pyright, and Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run Pyright
        run: pyright

      - name: Run Pytest
        run: pytest

