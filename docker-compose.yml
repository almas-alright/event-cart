services:
  api:
    build:
      context: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://eventcart:eventcart@postgres:5432/eventcart
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${EVENTCART_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventcart}
      POSTGRES_USER: ${POSTGRES_USER:-eventcart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventcart}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

